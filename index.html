<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>secondhand.studio | Curated Vintage & Streetwear</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0b0b0c;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 60px 20px 40px 20px;
        }
        h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            font-weight: 700;
            margin-bottom: 8px;
        }
        header p {
            color: #86868b;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .catalog {
            max-width: 500px;
            margin: 0 auto 40px auto;
            background: #121214;
            border: 1px solid #222225;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .catalog h2 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: #f5f5f7;
        }
        .catalog p {
            color: #a1a1a6;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .links-container {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .shop-btn {
            background-color: #f5f5f7;
            color: #0b0b0c;
            text-decoration: none;
            padding: 16px;
            border-radius: 30px;
            font-weight: 600;
            text-align: center;
            font-size: 1rem;
            transition: 0.2s ease;
        }
        .social-btn {
            background-color: transparent;
            color: #f5f5f7;
            text-decoration: none;
            padding: 16px;
            border-radius: 30px;
            font-weight: 500;
            text-align: center;
            font-size: 1rem;
            border: 1px solid #424245;
            transition: 0.2s ease;
        }
        .shop-btn:active, .social-btn:active {
            opacity: 0.8;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            color: #424245;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>secondhand.studio</h1>
        <p>curated sustainable fashion</p>
    </header>

    <div class="catalog">
        <h2>Drop 01: Coming Soon</h2>
        <p>We are currently sorting through premium vintage and modern streetwear pieces. Follow our socials to know exactly when the shop opens.</p>
    </div>

    <div class="links-container">
        <a href="#" class="shop-btn">Shop the Collection</a>
        <a href="https://instagram.com" class="social-btn">Instagram</a>
        <a href="#" class="social-btn">Contact Studio</a>
    </div>

    <footer>
        &copy; 2026 secondhand.studio
    </footer>

</body>
</html>
